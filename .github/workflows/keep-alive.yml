name: Keep Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ReOrder Health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --max-time 30 \
            https://reorder-81nz.onrender.com/_stcore/health)
          echo "Health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Site uyandırılıyor..."
            curl -s -o /dev/null -w "Root status: %{http_code}" \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              --max-time 60 \
              https://reorder-81nz.onrender.com/
          fi
