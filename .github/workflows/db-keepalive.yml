name: Supabase DB Keep Alive

# Supabase free tier ~1 hafta inaktivite sonrası projeyi PAUSE eder.
# Render health-ping'i yalnızca web sunucusunu uyandırır, DB'ye DOKUNMAZ.
#
# 2026-07-06'daki ilk sürüm sadece günde 1 kez ham psycopg2 SELECT 1 atıyordu.
# 14-21 Temmuz arası proje yine pause oldu — çıplak Postgres pooler bağlantısı
# Supabase'in aktiflik sayacını sıfırlamıyor gibi görünüyor (o sayaç Data API/
# Studio trafiğine bakıyor olabilir). Bu yüzden artık HEM Data API'ye (REST) HEM
# de doğrudan Postgres'e ping atıyoruz, günde 1 yerine 4 saatte bir.
#
# GEREKLİ Repo Secrets (Settings → Secrets and variables → Actions):
#   DATABASE_URL      postgresql://postgres.<PROJE_ID>:<SIFRE>@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
#   SUPABASE_URL       https://<PROJE_ID>.supabase.co
#   SUPABASE_ANON_KEY  Supabase anon/public API anahtarı

on:
  schedule:
    - cron: "17 */4 * * *"   # her 4 saatte bir
  workflow_dispatch:

jobs:
  keep-db-warm:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install psycopg2
        run: pip install --quiet "psycopg2-binary>=2.9.0"

      - name: Ping Data API (aktiflik sayacını sıfırlar)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::warning::SUPABASE_URL/SUPABASE_ANON_KEY tanımlı değil, Data API ping atlanıyor."
          else
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              -H "apikey: $SUPABASE_ANON_KEY" \
              "$SUPABASE_URL/rest/v1/?select=1")
            echo "Data API HTTP status: $code"
            if [ "$code" -ge 500 ]; then
              echo "::error::Data API 5xx döndü"
              exit 1
            fi
          fi

      - name: Ping database (doğrudan Postgres)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret tanımlı değil. Repo Settings → Secrets → Actions'tan ekleyin."
            exit 1
          fi
          python - <<'PY'
          import os, sys, psycopg2
          url = os.environ["DATABASE_URL"]
          try:
              conn = psycopg2.connect(url, connect_timeout=15)
              cur = conn.cursor()
              cur.execute("SELECT 1")
              print("DB keep-alive OK:", cur.fetchone())
              conn.close()
          except Exception as e:
              print("DB keep-alive FAILED:", type(e).__name__, str(e)[:200], file=sys.stderr)
              sys.exit(1)
          PY
