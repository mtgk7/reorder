<!doctype html><html lang="tr"><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1280px;height:720px;overflow:hidden;
  font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  background:
    radial-gradient(900px 600px at 88% -10%, rgba(242,133,0,.16), transparent 60%),
    radial-gradient(700px 500px at 0% 110%, rgba(19,78,94,.55), transparent 55%),
    linear-gradient(135deg,#08202c 0%,#0c3243 46%,#10485a 100%);
  color:#e8f4fa;}
.wrap{width:100%;height:100%;padding:64px 72px;display:flex;flex-direction:column;}
/* header */
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:34px;}
.title-row{display:flex;flex-direction:column;gap:8px;}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(16,185,129,.12);
  border:1px solid rgba(16,185,129,.4);border-radius:30px;padding:6px 16px;width:max-content;
  font-size:15px;font-weight:700;color:#10B981;letter-spacing:.08em;}
.badge .dot{width:8px;height:8px;border-radius:50%;background:#10B981;box-shadow:0 0 10px #10B981;}
.h1{font-size:38px;font-weight:800;letter-spacing:-.01em;
  background:linear-gradient(120deg,#ffffff 0%,#ffd9a8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo{display:flex;align-items:center;gap:12px;opacity:.92;}
.logo .mark{font-size:34px;filter:drop-shadow(0 0 14px rgba(242,133,0,.6));}
.logo .name{font-size:23px;font-weight:800;color:#e8f4fa;}
/* body */
.body{flex:1;display:flex;gap:34px;min-height:0;}
.kpis{flex:0 0 46%;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:22px;}
.card{position:relative;background:linear-gradient(160deg,rgba(255,255,255,.075),rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:30px 30px 26px;
  display:flex;flex-direction:column;justify-content:center;gap:10px;overflow:hidden;
  box-shadow:0 16px 40px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.07);}
.card::before{content:"";position:absolute;left:0;top:18px;bottom:18px;width:5px;border-radius:0 4px 4px 0;
  background:linear-gradient(#F28500,#D46000);box-shadow:0 0 16px rgba(242,133,0,.55);}
.card .lbl{font-size:14.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(180,210,230,.6);}
.card .val{font-size:46px;font-weight:800;line-height:1;color:#F6A23C;
  text-shadow:0 2px 20px rgba(242,133,0,.3);}
.card .delta{font-size:14.5px;font-weight:600;color:#10B981;display:flex;align-items:center;gap:6px;}
.card .ic{position:absolute;right:24px;top:22px;font-size:24px;opacity:.32;}
/* chart */
.chart{flex:1;background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.015));
  border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:30px 32px 26px;
  display:flex;flex-direction:column;
  box-shadow:0 16px 40px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.07);}
.chart .ctitle{font-size:21px;font-weight:800;color:#e8f4fa;}
.chart .csub{font-size:14px;color:rgba(180,210,230,.5);margin-top:4px;}
.chart .cbig{margin-top:14px;display:flex;align-items:baseline;gap:12px;}
.chart .cbig .n{font-size:34px;font-weight:800;color:#fff;}
.chart .cbig .t{font-size:14px;font-weight:600;color:#10B981;}
.csvg{flex:1;margin-top:10px;min-height:0;}
.months{display:flex;justify-content:space-between;font-size:12px;color:rgba(180,210,230,.4);margin-top:6px;}
</style></head><body>
<div class="wrap">
  <div class="head">
    <div class="title-row">
      <div class="badge"><span class="dot"></span>CANLI PANEL</div>
      <div class="h1">Mağaza Genel Bakış</div>
    </div>
    <div class="logo"><span class="mark">🔄</span><span class="name">ReOrder</span></div>
  </div>
  <div class="body">
    <div class="kpis">
      <div class="card"><span class="ic">🧾</span><div class="lbl">Sipariş</div><div class="val">2.140</div><div class="delta">▲ %8,2 bu ay</div></div>
      <div class="card"><span class="ic">🔁</span><div class="lbl">Tekrar Oranı</div><div class="val">%42,7</div><div class="delta">▲ %3,1 bu ay</div></div>
      <div class="card"><span class="ic">💰</span><div class="lbl">Toplam Gelir</div><div class="val">₺283K</div><div class="delta">▲ %15,4 bu ay</div></div>
      <div class="card"><span class="ic">👤</span><div class="lbl">Ort. LTV</div><div class="val">₺680</div><div class="delta">▲ %6,0 bu ay</div></div>
    </div>
    <div class="chart">
      <div class="ctitle">Aylık Gelir Trendi</div>
      <div class="csub">Son 12 ay · ₺</div>
      <div class="cbig"><span class="n">₺283.450</span><span class="t">▲ %15,4 YoY</span></div>
      <svg class="csvg" id="svg" viewBox="0 0 600 260" preserveAspectRatio="none"></svg>
      <div class="months"><span>Tem</span><span>Ağu</span><span>Eyl</span><span>Eki</span><span>Kas</span><span>Ara</span><span>Oca</span><span>Şub</span><span>Mar</span><span>Nis</span><span>May</span><span>Haz</span></div>
    </div>
  </div>
</div>
<script>
(function(){
  var data=[34,41,38,49,55,52,63,68,61,76,84,97];
  var W=600,H=260,pad=8;
  var max=Math.max.apply(null,data)*1.08, min=0;
  var n=data.length;
  function x(i){return pad + i*(W-2*pad)/(n-1);}
  function y(v){return H-pad - (v-min)/(max-min)*(H-2*pad);}
  var pts=data.map(function(v,i){return [x(i),y(v)];});
  function path(close){
    var d="M"+pts[0][0]+","+pts[0][1];
    for(var i=0;i<pts.length-1;i++){
      var p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
      var c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
      var c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
      d+="C"+c1x+","+c1y+" "+c2x+","+c2y+" "+p2[0]+","+p2[1];
    }
    if(close){d+="L"+pts[n-1][0]+","+(H-pad)+"L"+pts[0][0]+","+(H-pad)+"Z";}
    return d;
  }
  var grid="";
  for(var g=1;g<=3;g++){var gy=pad+(H-2*pad)*g/4;grid+='<line x1="'+pad+'" y1="'+gy+'" x2="'+(W-pad)+'" y2="'+gy+'" stroke="rgba(255,255,255,.06)" stroke-width="1"/>';}
  var svg=document.getElementById("svg");
  svg.innerHTML=
    '<defs><linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0" stop-color="rgba(242,133,0,.42)"/>'
    +'<stop offset="1" stop-color="rgba(242,133,0,0)"/></linearGradient>'
    +'<linearGradient id="ln" x1="0" y1="0" x2="1" y2="0">'
    +'<stop offset="0" stop-color="#F6A23C"/><stop offset="1" stop-color="#F28500"/></linearGradient></defs>'
    +grid
    +'<path d="'+path(true)+'" fill="url(#fill)"/>'
    +'<path d="'+path(false)+'" fill="none" stroke="url(#ln)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>'
    +'<circle cx="'+pts[n-1][0]+'" cy="'+pts[n-1][1]+'" r="6" fill="#fff"/>'
    +'<circle cx="'+pts[n-1][0]+'" cy="'+pts[n-1][1]+'" r="11" fill="none" stroke="#F28500" stroke-width="2.5" opacity=".7"/>';
})();
</script>
</body></html>
