<!doctype html><html lang="tr"><head><meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1280px;height:720px;overflow:hidden;
  font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  background:
    radial-gradient(900px 600px at 88% -10%, rgba(242,133,0,.16), transparent 60%),
    radial-gradient(700px 500px at 0% 110%, rgba(19,78,94,.55), transparent 55%),
    linear-gradient(135deg,#08202c 0%,#0c3243 46%,#10485a 100%);
  color:#e8f4fa;}
.wrap{width:100%;height:100%;padding:60px 72px;display:flex;flex-direction:column;}
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;}
.title-row{display:flex;flex-direction:column;gap:8px;}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(242,133,0,.12);
  border:1px solid rgba(242,133,0,.42);border-radius:30px;padding:6px 16px;width:max-content;
  font-size:15px;font-weight:700;color:#F6A23C;letter-spacing:.08em;}
.h1{font-size:38px;font-weight:800;letter-spacing:-.01em;
  background:linear-gradient(120deg,#ffffff 0%,#ffd9a8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo{display:flex;align-items:center;gap:12px;opacity:.92;}
.logo .mark{font-size:34px;filter:drop-shadow(0 0 14px rgba(242,133,0,.6));}
.logo .name{font-size:23px;font-weight:800;color:#e8f4fa;}
.panel{flex:1;background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.015));
  border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:26px 30px;
  display:flex;flex-direction:column;
  box-shadow:0 16px 40px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.07);}
.matrix{flex:1;display:flex;flex-direction:column;gap:10px;min-height:0;}
.row{display:grid;grid-template-columns:120px repeat(5,1fr);gap:10px;flex:1;}
.hrow{flex:0 0 auto;}
.hcell{display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;
  letter-spacing:.06em;color:rgba(180,210,230,.55);text-transform:uppercase;padding-bottom:2px;}
.hcell.mo{justify-content:flex-start;padding-left:4px;}
.mo-lbl{display:flex;align-items:center;font-size:16px;font-weight:700;color:rgba(180,210,230,.8);padding-left:4px;}
.cell{display:flex;align-items:center;justify-content:center;border-radius:14px;
  font-size:27px;font-weight:800;color:#fff;letter-spacing:.01em;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.14), 0 6px 16px rgba(0,0,0,.18);}
.cell.empty{background:rgba(255,255,255,.04)!important;color:rgba(255,255,255,.16);font-size:20px;
  box-shadow:none;border:1px dashed rgba(255,255,255,.08);}
.foot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;margin-top:22px;}
.legend{display:flex;align-items:center;gap:18px;font-size:14px;color:rgba(180,210,230,.55);}
.lg{display:flex;align-items:center;gap:7px;}
.sw{width:16px;height:16px;border-radius:5px;}
.avg{display:flex;align-items:center;gap:14px;background:rgba(242,133,0,.1);
  border:1px solid rgba(242,133,0,.3);border-radius:16px;padding:12px 22px;}
.avg .al{font-size:14px;color:rgba(180,210,230,.6);font-weight:600;}
.avg .av{font-size:30px;font-weight:800;color:#F6A23C;}
</style></head><body>
<div class="wrap">
  <div class="head">
    <div class="title-row">
      <div class="badge">RETENTION ANALİZİ</div>
      <div class="h1">Cohort Retention Matrisi</div>
    </div>
    <div class="logo"><span class="mark">🔄</span><span class="name">ReOrder</span></div>
  </div>
  <div class="panel">
    <div class="matrix" id="matrix"></div>
    <div class="foot">
      <div class="legend">
        <span class="lg"><span class="sw" style="background:#10B981"></span>%60+</span>
        <span class="lg"><span class="sw" style="background:#F59E0B"></span>%40+</span>
        <span class="lg"><span class="sw" style="background:#F97316"></span>%20+</span>
        <span class="lg"><span class="sw" style="background:#EF4444"></span>&lt;%20</span>
        <span class="lg"><span class="sw" style="background:rgba(255,255,255,.08);border:1px dashed rgba(255,255,255,.2)"></span>veri yok</span>
      </div>
      <div class="avg"><span class="al">Ortalama Retention (6 ay)</span><span class="av">%34,2</span></div>
    </div>
  </div>
</div>
<script>
(function(){
  var cols=["Ay 0","Ay 1","Ay 2","Ay 3","Ay 4"];
  var rows=[
    {m:"2025-10",v:[100,42,28,14,8]},
    {m:"2025-11",v:[100,38,25,11,null]},
    {m:"2025-12",v:[100,44,31,null,null]},
    {m:"2026-01",v:[100,48,null,null,null]},
    {m:"2026-02",v:[100,null,null,null,null]}
  ];
  function color(v){
    if(v>=60)return "#10B981";
    if(v>=40)return "#F59E0B";
    if(v>=20)return "#F97316";
    return "#EF4444";
  }
  var host=document.getElementById("matrix");
  var h='<div class="row hrow"><div class="hcell mo"></div>';
  cols.forEach(function(c){h+='<div class="hcell">'+c+'</div>';});
  h+='</div>';
  host.innerHTML=h;
  rows.forEach(function(r){
    var html='<div class="row"><div class="mo-lbl">'+r.m+'</div>';
    r.v.forEach(function(v){
      if(v===null){html+='<div class="cell empty">—</div>';}
      else{
        var c=color(v);
        html+='<div class="cell" style="background:linear-gradient(160deg,'+c+','+c+'cc)">%'+v+'</div>';
      }
    });
    html+='</div>';
    host.insertAdjacentHTML("beforeend",html);
  });
})();
</script>
</body></html>
