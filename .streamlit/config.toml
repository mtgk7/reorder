[theme]
primaryColor = "#F27A1A"
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1A1A2E"
font = "sans serif"

[server]
headless = true
enableXsrfProtection = true
fileWatcherType = "none"
maxUploadSize = 10

[browser]
gatherUsageStats = false

[client]
showErrorDetails = false
toolbarMode = "minimal"
